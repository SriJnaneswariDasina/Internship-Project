<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard-container">

    <h1>📊 Phishing Campaign Analytics</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Targets</h3>
            <p>{{ total }}</p>
        </div>

        <div class="card">
            <h3>Clicks</h3>
            <p>{{ clicks }}</p>
        </div>

        <div class="card">
            <h3>Submissions</h3>
            <p>{{ submitted }}</p>
        </div>

    </div>

    <a href="/" class="btn">⬅ Back to Home</a>

</div>

</body>
</html>
