<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-8 shadow-md rounded w-96">
    <h2 class="text-2xl font-bold text-center mb-4 text-blue-700">🔐 Login to Scanner</h2>
    <form method="POST" class="flex flex-col gap-4">
      <input type="text" name="username" placeholder="Username" class="border p-2 rounded" required>
      <input type="password" name="password" placeholder="Password" class="border p-2 rounded" required>
      <button type="submit" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
    </form>
  </div>
</body>
</html>
