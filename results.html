<!DOCTYPE html>
<html>
<head>
    <title>Scan Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="max-w-5xl mx-auto mt-12 p-8 bg-white shadow-lg rounded">
        <h1 class="text-3xl font-bold text-center text-green-700 mb-6">🛡️ Scan Results for {{ target }}</h1>
        {% if results %}
            <div class="space-y-4">
                {% for r in results %}
                    <div class="border-l-4 border-red-500 bg-red-50 p-4 shadow-sm">
                        <strong>{{ r.vulnerability }}</strong> found at
                        <a href="{{ r.url }}" class="text-blue-600 underline" target="_blank">{{ r.url }}</a><br>
                        <span class="text-sm">Evidence: {{ r.evidence }}</span>
                    </div>
                    <div class="flex justify-center mt-8 gap-4">
                         <a href="/export/html" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Export as HTML</a>
                         <a href="/export/pdf" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Export as PDF</a>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-center text-gray-600">No vulnerabilities found.</p>
        {% endif %}
        <div class="text-center mt-6">
            <a href="/" class="text-blue-700 underline">🔁 Scan another site</a>
        </div>
    </div>
</body>
</html>
