<!DOCTYPE html>
<html>
<head>
    <title>Web Vulnerability Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="max-w-3xl mx-auto mt-20 p-10 bg-white shadow-lg rounded">
        <h1 class="text-3xl font-bold text-center text-blue-700 mb-6">🔍 Web Vulnerability Scanner</h1>
        <form id="scan-form" class="flex flex-col gap-4">
           <input type="text" id="url" placeholder="Enter target URL" class="border p-2 rounded" required>
           <button type="submit" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Start Scan</button>
        </form>
        <div id="progress" class="mt-6 text-center font-semibold"></div>
    </div>
    <script>
    document.getElementById('scan-form').addEventListener('submit', function(e) {
       e.preventDefault();
       let url = document.getElementById('url').value;
       document.getElementById('progress').innerText = '🔍 Scanning in progress...';
       fetch('/scan', {
         method: 'POST',
         headers: {'Content-Type': 'application/json'},
         body: JSON.stringify({url: url})
       })
       .then(res => res.json())
       .then(data => {
         window.location.href = `/results?url=${encodeURIComponent(url)}`;
       });
     });
     </script>
</body>
</html>
